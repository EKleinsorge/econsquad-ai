name: Monday AI for ED Drop — Weekly Send

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - check only, do not send'
        required: false
        default: 'false'

jobs:
  send-monday-drop:
    name: Send Monday Drop
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger send-monday-drop Edge Function
        run: |
          echo "Triggering Monday Drop send at $(date -u)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/send-monday-drop" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"dry_run\": \"$DRY_RUN\"}")
          BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP=$(echo "$RESPONSE" | tail -n1)
          echo "HTTP $HTTP"
          echo "$BODY"
          if [ "$HTTP" != "200" ]; then exit 1; fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
